{% extends 'Layouts/main.html' %}

{% block breadcrumbs %}
<ol class="breadcrumb float-sm-end">
    <li class="breadcrumb-item"><a href="/">Início</a></li>
    <li class="breadcrumb-item"><a href="/enterprise/lista">Lista de empresas</a></li>
    <li class="breadcrumb-item active" aria-current="page">Detalhes da empresa</li>
</ol>
{% endblock %}

{% block main %}
<form id="form">
    <input type="hidden" id="action" name="action" value="{{action}}">
    <input type="hidden" id="id" name="id" value="{{id}}">

    <div class="row">
        <div class="col-12">
            <div class="card">
                <div class="card-header d-flex justify-content-between align-items-center gap-2">
                    <a href="/enterprise/lista" class="btn btn-warning">
                        <i class="fa-solid fa-chevron-left"></i>
                        Voltar
                    </a>
                    <a href="/fornecedor/lista" class="btn btn-primary">
                        <i class="fa-solid fa-store"></i>
                        Ir para fornecedores
                    </a>

                </div>

                <div class="card-body">
                    <div class="row">
                        <div class="col-lg-6 col-md-6">
                            <div class="form-floating mb-3">
                                <input autofocus type="text" class="form-control" id="nomeExibicao"
                                       name="nomeExibicao" placeholder="Nome" value="{{enterprise.nomeExibicao}}" required>
                                <label for="nomeExibicao">Nome</label>
                            </div>
                        </div>

                        <div class="col-lg-6 col-md-6">
                            <div class="form-floating mb-3">
                                <input type="text" class="form-control" id="cnpj" name="cnpj"
                                       placeholder="CNPJ" value="{{enterprise.cnpj}}" required>
                                <label for="cnpj">CNPJ</label>
                            </div>
                        </div>

                        <div class="col-12">
                            <div class="form-floating mb-3">
                                <input type="text" class="form-control" id="nomeLegal" name="nomeLegal"
                                       placeholder="Razão social" value="{{enterprise.nomeLegal}}" required>
                                <label for="nomeLegal">Razão social</label>
                            </div>
                        </div>

                        <div class="col-lg-6 col-md-6">
                            <div class="form-floating mb-3">
                                <input type="text" class="form-control" id="numeroDocumento" name="numeroDocumento"
                                       placeholder="Documento" value="{{enterprise.numeroDocumento}}">
                                <label for="numeroDocumento">Documento</label>
                            </div>
                        </div>

                        <div class="col-lg-6 col-md-6">
                            <div class="form-floating mb-3">
                                <input type="text" class="form-control" id="registroSecundario" name="registroSecundario"
                                       placeholder="Registro secundário" value="{{enterprise.registroSecundario}}">
                                <label for="registroSecundario">Registro secundário</label>
                            </div>
                        </div>

                        <div class="col-lg-6 col-md-6">
                            <div class="form-floating mb-3">
                                <input type="text" class="form-control" id="dataRegistro" name="dataRegistro"
                                       placeholder="Data de registro" value="{{enterprise.dataRegistro}}">
                                <label for="dataRegistro">Data de registro</label>
                            </div>
                        </div>

                        <div class="col-lg-6 col-md-6">
                            <div class="form-floating mb-3">
                                <input type="text" class="form-control" id="regimeTributario" name="regimeTributario"
                                       placeholder="Regime tributário" value="{{enterprise.regimeTributario}}">
                                <label for="regimeTributario">Regime tributário</label>
                            </div>
                        </div>

                        <div class="col-lg-6 col-md-6">
                            <div class="form-floating mb-3">
                                <input type="text" class="form-control" id="codigoAtividadeEconomica" name="codigoAtividadeEconomica"
                                       placeholder="Atividade econômica" value="{{enterprise.codigoAtividadeEconomica}}">
                                <label for="codigoAtividadeEconomica">Atividade econômica</label>
                            </div>
                        </div>

                        <div class="col-lg-6 col-md-6">
                            <div class="form-floating mb-3">
                                <input type="text" class="form-control" id="cnae" name="cnae"
                                       placeholder="CNAE" value="{{enterprise.cnae}}">
                                <label for="cnae">CNAE</label>
                            </div>
                        </div>

                        <div class="col-12">
                            <div class="icheck-primary d-inline">
                                <input class="form-check-label" type="checkbox" id="ativo" name="ativo" value="true" {% if enterprise.ativo==1 %} checked {% endif %}>
                                <label for="ativo">Ativo?</label>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="card-footer">
                    <button id="insert" type="button" class="btn btn-success">
                        <i class="fa-solid fa-floppy-disk"></i>
                        Salvar
                    </button>
                </div>
            </div>
        </div>
    </div>
</form>
{% endblock %}

{% block script %}
{{ vite('resources/js/pages/enterprise.js') }}
{% endblock %}
