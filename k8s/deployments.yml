apiVersion: apps/v1
kind: Deployment
metadata:
  name: php-fpm
  namespace: newuctwoteen
spec:
  replicas: 1
  selector:
    matchLabels:
      app: php-fpm
  template:
    metadata:
      labels:
        app: php-fpm
    spec:
      containers:
        - name: php-fpm
          image: newuctwoteen-php:latest

          ports:
            - containerPort: 9000
          env:
            - name: DB_CONNECTION
              value: pgsql
            - name: DB_HOST
              value: postgres
            - name: DB_PORT
              value: "5432"
            - name: DB_NAME
              value: newuct
            - name: DB_USER
              value: postgres
            - name: DB_PASSWORD
              value: postgres
            - name: REDIS_HOST
              value: redis
            - name: REDIS_PORT
              value: "6379"
            - name: REDIS_PASSWORD
              value: ""
            - name: app_ENV
              value: production

          readinessProbe:
            tcpSocket:
              port: 9000
            initialDelaySeconds: 10
            periodSeconds: 10

---

apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx
  namespace: newuctwoteen
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nginx
  template:
    metadata:
      labels:
        app: nginx
    spec:
      containers:
        - name: nginx
          image: nginx:1.31.0-alpine3.23
          ports:
            - containerPort: 80
          volumeMounts:
            - name: nginx-conf
              mountPath: /etc/nginx/conf.d/default.conf
              subPath: default.conf
            - name: public
              mountPath: /var/www/public
              readOnly: false

        # initContainer copia /var/www/public a partir da imagem PHP-FPM (newuctwoteen:1.0)
        # para o Nginx servir a aplicação.
        - name: copy-public
          image: newuctwoteen-php:latest

          command: ["sh","-c","cp -R /var/www/public/. /var/www/public-target/ || true"]
          volumeMounts:
            - name: public
              mountPath: /var/www/public-target
            - name: public-source
              mountPath: /var/www/public


      volumes:

        - name: nginx-conf
          configMap:
            name: nginx-conf
        - name: public
          emptyDir: {}
        - name: public-source
          emptyDir: {}



